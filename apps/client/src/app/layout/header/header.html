<header class="sticky top-0 z-40 border-b border-gray-200 bg-white/90 backdrop-blur dark:border-gray-800 dark:bg-gray-900/90">
  <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3">
    <a routerLink="/" class="text-lg font-bold text-gray-900 dark:text-gray-100">
      {{ profile.name }}
    </a>

    <nav class="hidden items-center gap-4 md:flex" aria-label="Main navigation">
      @for (item of navItems; track item.fragment) {
        <a
          [routerLink]="['/']"
          [fragment]="item.fragment"
          class="text-sm text-gray-600 hover:text-sky-600 dark:text-gray-300 dark:hover:text-sky-400"
        >
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="flex items-center gap-2">
      <app-theme-toggle />
      <p-button
        label="Contact"
        size="small"
        [routerLink]="['/']"
        fragment="contact"
      />
    </div>
  </div>
</header>
